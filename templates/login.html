<!DOCTYPE html>
<html lang="en">
<head>
    <!-- <link href="{{ url_for('static', path='css/bootstrap.css') }}" rel="stylesheet" type="text/css">
    <link href="{{ url_for('static', path='css/base.css') }}" rel="stylesheet" type="text/css">-->
    <meta charset="UTF-8">
    <title>FastAPI + Jinja + Bootstrap</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- Bootstrap ICONS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body background="/static/imgs/cables.jpg">

<div class="container text-center">

  <div class="row align-items-start">

    <div class="col">

        <div class="mx-auto p-5" style="width: 800px;">
            <div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        <div class="carousel-item active w-90 p-5">
                            <img src="/static/imgs/cables.jpg" class="d-block w-100" alt="...">
                        </div>
                        <div class="carousel-item active w-90 p-5">
                            <img src="/static/imgs/conexiones.jpg" class="d-block w-100" alt="...">
                        </div>
                        <div class="carousel-item active w-90 p-5">
                            <img src="/static/imgs/net.jpg" class="d-block w-100" alt="...">
                        </div>
                    </div>
                </div>
        </div>
    </div>

    <div class="col">

    <div class="mx-auto p-5" style="width: 200px;"></div>
      <div class="card">
            <div class="card-header">
                Login
            </div>
            <div class="card-body"  style="width: 20rem";>
                <form action="/login" id="loginForm" method="post">
                    <div class="form-group">
                        <label for="">Username</label>
                        <input type="text" class="form-control" name="username" autocomplete="username" required>
                    </div>
                    <div class="form-group>
                        <label for="">Password</label>
                        <input type="password" class="form-control" name="password" autocomplete="current-password" id="">
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
            </div>
            <div class="card-footer text-muted">
                <a href="/auth">Olvide mi Contraseña</a>
            </div>
        </div>
    </div>
  </div>


</div>


</body>
</html>
